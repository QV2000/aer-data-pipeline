# AER Data Pipeline - Source Registry
# All datasets must be public and verifiable from AER/Alberta Open Data pages
# HTML index pages are scraped for current download links (not hardcoded URLs)

defaults:
  timezone: America/Edmonton
  public_source: true
  redistributable: false  # Conservative default; override per dataset

datasets:
  # ============================================================================
  # FACILITIES (ST102)
  # Source: https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st102
  # ============================================================================
  
  st102_active_facilities:
    province: AB
    name: "ST102 Active Facilities"
    description: "List of active batteries, gas plants, meter stations, and other facilities"
    source_type: html_index
    index_url: "https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st102"
    link_pattern: "ActiveFacility\\.txt$"
    expected_cadence: monthly
    download_format: txt
    parser: parsers.txt_parser.parse_st102_facility
    schema:
      required_columns:
        - facility_id
        - facility_name
        - operator_name
        - facility_type
        - status
      primary_keys: [facility_id]
    validation:
      min_rows: 50000
      max_row_delta_pct: 20

  st102_inactive_facilities:
    province: AB
    name: "ST102 Inactive Facilities"
    description: "List of inactive/abandoned facilities"
    source_type: html_index
    index_url: "https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st102"
    link_pattern: "InactiveFacility\\.txt$"
    expected_cadence: monthly
    download_format: txt
    parser: parsers.txt_parser.parse_st102_facility
    schema:
      required_columns:
        - facility_id
        - facility_name
        - operator_name
        - facility_type
        - status
      primary_keys: [facility_id]
    validation:
      min_rows: 10000

  st102_facilities_shapefile:
    province: AB
    name: "ST102 Facilities Shapefile"
    description: "Geocoded facility locations"
    source_type: html_index
    index_url: "https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st102"
    link_pattern: "ST102-SHP\\.zip$"
    expected_cadence: monthly
    download_format: zip_shp
    parser: parsers.shapefile_parser.parse_shapefile
    geo_config:
      output_crs: "EPSG:4326"
      include_centroids: true
    schema:
      primary_keys: [facility_id]
      geo_fields: [geometry, centroid_lon, centroid_lat]

  # ============================================================================
  # PIPELINES (Spatial Data)
  # Source: https://www.aer.ca/providing-information/data-and-reports/maps-and-shapefiles
  # ============================================================================
  
  enhanced_pipeline_shapefile:
    province: AB
    name: "Enhanced Pipeline Shapefile"
    description: "Pipeline lines and installations across Alberta"
    source_type: html_index
    index_url: "https://www.aer.ca/data-and-performance-reports/activity-and-data/spatial-data"
    link_pattern: "Pipeline.*_SHP\\.zip$"
    multi_file: true
    expected_cadence: monthly
    download_format: zip_shp
    parser: parsers.shapefile_parser.parse_shapefile
    geo_config:
      output_crs: "EPSG:4326"
      include_centroids: true
      timeout_seconds: 300  # Large files
    schema:
      primary_keys: [pipeline_licence, line_no]
      geo_fields: [geometry, centroid_lon, centroid_lat]
    validation:
      min_rows: 100000

  # ============================================================================
  # WELLS - Reference Data
  # ============================================================================

  confidential_well_list:
    province: AB
    name: "Confidential Well List"
    description: "Daily list of Alberta wells with confidential status"
    source_type: direct_file
    url: "https://static.aer.ca/prd/data/conwell/ConWell.txt"
    expected_cadence: daily
    download_format: txt
    parser: parsers.txt_parser.parse_confidential_well_list
    schema:
      primary_keys: [uwi]
      required_columns: [uwi, release_date]
    amendment_handling:
      upsert_keys: [uwi]

  # NOTE: general_well_data_file removed - requires catalog portal access (not yet implemented)

  # ============================================================================
  # PRODUCTION - Time Series
  # ============================================================================
  
  # NOTE: well_production_data_file removed - use petrinex_production instead (free, last 5 years)

  petrinex_production:
    province: AB
    name: "Petrinex Conventional Volumetric Data"
    description: "Well and facility production volumes from Petrinex (Free, Last 5 Years)"
    source_type: static_url # We will handle the date range in the downloader logic
    url: "https://www.petrinex.gov.ab.ca/publicdata/API/Files/AB/Vol/{date}/CSV"
    expected_cadence: monthly
    download_format: zip_csv
    parser: parsers.txt_parser.parse_petrinex_production
    amendment_handling:
      enabled: true
      upsert_keys: [uwi, production_month, activity, product]
    schema:
      primary_keys: [uwi, production_month, activity, product]


  # ============================================================================
  # WELLS - ST37 (List of Wells)
  # Source: https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st37
  # ============================================================================
  
  st37_wells_txt:
    province: AB
    name: "ST37 List of Wells (TXT)"
    description: "Monthly list of all wells in Alberta with detailed attributes"
    source_type: html_index
    index_url: "https://www.aer.ca/data-and-performance-reports/statistical-reports/st37"
    link_pattern: "ST37\\.zip$" # Matches ST37.zip
    expected_cadence: monthly
    download_format: zip_txt
    parser: parsers.txt_parser.parse_st37_wells
    schema:
      primary_keys: [uwi]
      required_columns:
        - uwi                 # UWI_DISPLAY_FORMAT (e.g., 00/06-06-001-01W4/0)
        - uwi_id              # LOC-DESC key for joins (e.g., 14010606000)
        - well_name           # Well name
        - field_code          # Field code (links to field reference data)
        - licence_no          # Licence number
        - licence_status      # Licence status (e.g., RecCertified)
        - licensee_code       # BA code for licensee (e.g., A5D40)
        - well_stat_code      # Well status code
        - well_stat_date      # Well status date (YYYYMMDD)
        - mode                # Mode (ABD=abandoned, etc.)
      optional_columns:
        - update_flag
        - pool_code
        - os_area_code
        - os_dep_code
        - licence_issue_date
        - agent_code
        - operator_code
        - fin_drl_date        # Finished drilling date
        - well_total_depth    # Total depth in meters
        - fluid
        - type
        - structure


  # NOTE: ST37 shapefiles removed - coordinates are in st37_wells_txt already

  # ============================================================================
  # WELLS - ST49 (Daily Spud)
  # Source: https://www.aer.ca/providing-information/data-and-reports/statistical-reports/st49
  # ============================================================================
  
  st49_daily_spud:
    province: AB
    name: "ST49 Daily Spud List"
    description: "Daily spud data for active drilling"
    source_type: html_index
    index_url: "https://www.aer.ca/data-and-performance-reports/statistical-reports/st49"
    link_pattern: "(?i)SPUD.*\\.txt$" # Case-insensitive match for SPUDSun.txt, etc.
    expected_cadence: daily
    download_format: txt
    parser: parsers.txt_parser.parse_st49_spud
    multi_file: true
    schema:
      required_columns:
        - spud_date
        - licence_number
        - uwi
        - drilling_contractor
      primary_keys: [uwi, spud_date]

  st1_well_licences:
    province: AB
    name: "ST1 Well Licences Issued"
    description: "Daily list of well licences issued"
    source_type: html_index
    index_url: "https://www.aer.ca/data-and-performance-reports/statistical-reports/st1"
    link_pattern: "(?i)WELLS.*\\.TXT$" # Case-insensitive match for WELLSSUN.TXT, etc.
    expected_cadence: daily
    download_format: txt
    parser: parsers.txt_parser.parse_st1_licences
    multi_file: true
    schema:
      primary_keys: [licence_number]


  # ============================================================================
  # HISTORICAL ARCHIVES - ST1 & ST49
  # These provide backfill data beyond the rolling 7-day window
  # ============================================================================

  st1_well_licences_archive:
    province: AB
    name: "ST1 Well Licences Archive"
