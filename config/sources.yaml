    index_url: "https://www.aer.ca/data-and-performance-reports/statistical-reports/st2"
    download_urls:
      - "https://www2.aer.ca/t/Production/views/PRD_0010_ST2_IMB_Weekly_Status_Changes_CSV_EXT/WeeklyStatusChangesReport.csv"
      - "https://www2.aer.ca/t/Production/views/PRD_0010_ST2_IMB_Weekly_Status_Changes_CSV_EXT/WeeklyAbandonmentStatusChangesReport.csv"
