  # ============================================================================
  # SASKATCHEWAN - PIPELINES (Spatial Data)
  # Source: Saskatchewan GeoHub / ArcGIS REST Services
  # ============================================================================

  sk_pipelines:
    province: SK
    name: "Saskatchewan Pipelines"
    description: "Pipeline lines across Saskatchewan from GeoHub ArcGIS service"
    source_type: arcgis_rest
    base_url: "https://gis.saskatchewan.ca/arcgis/rest/services/Economy/Pipelines/MapServer/0/query"
    query_params:
      where: "1=1"
      outFields: "*"
      f: "geojson"
    pagination:
      enabled: true
      page_size: 1000
      offset_param: "resultOffset"
      count_param: "resultRecordCount"
    expected_cadence: daily  # Run with daily cron to ensure data is available
    download_format: geojson
    parser: parsers.sk_parser.parse_sk_pipelines
    geo_config:
      output_crs: "EPSG:4326"
      geometry_type: LineString
    schema:
      required_columns:
        - licence_number
        - owner_name
        - substance
      primary_keys: [licence_number, segment_identifier]
      geo_fields: [geometry, from_lat, from_lon, to_lat, to_lon]
    validation:
      min_rows: 4000
