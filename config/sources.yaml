  # ============================================================================

  petrinex_well_facility_link:
    province: AB
    name: "Petrinex Well to Facility Link"
    description: "Maps each well to its linked facility (battery) - critical for pipeline connectivity"
    source_type: direct_file
    url: "https://www.petrinex.gov.ab.ca/publicdata/API/Files/AB/Infra/Well%20to%20Facility%20Link/CSV"
    expected_cadence: monthly
    download_format: nested_zip_csv  # ZIP containing ZIP containing CSV
    parser: parsers.csv_parser.parse_petrinex_well_facility_link
