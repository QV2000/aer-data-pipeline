  # ============================================================================
  
  # NOTE: open_alberta_facility_codes removed - open_data_api not yet implemented

  # ============================================================================
  # ST2 - WEEKLY DRILLING & STATUS CHANGES
  # Source: https://www.aer.ca/data-and-performance-reports/statistical-reports/st2
  # ============================================================================

  st2_weekly_status_changes:
