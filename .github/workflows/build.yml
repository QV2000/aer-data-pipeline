name: Build Data

on:
  schedule:
    - cron: '0 6 * * 0'  # Weekly, Sunday 6am UTC
  workflow_dispatch:

jobs:
  build-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline
        env:
          DATA_DIR: ./data
        run: |
          python cli.py ingest --all --petrinex-months 3
          python cli.py build-duckdb

      - name: Create release artifacts
        run: |
          tar -czf silver-parquet.tar.gz -C data/silver .
          cp data/../aer_data.duckdb ./aer_data.duckdb || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aer-data-${{ github.run_number }}
          path: |
            aer_data.duckdb
            silver-parquet.tar.gz
          retention-days: 30
